Replace with this:

name: Update NM Bin Buddy

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UK time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run updater
        run: python scripts/update_nm_bin_buddy.py

      - name: Commit changes
        run: |
          git config --global user.email "bot@nm-bin-buddy"
          git config --global user.name "NM Bin Buddy Bot"
          git add nm_bin_buddy.ics
          git commit -m "Auto-update calendar" || echo "No changes"
          git push
